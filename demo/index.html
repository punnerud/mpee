<style>
  :root{
    --accent:#0d9488; --accent2:#2dd4bf; --bg:#0e1419; --panel:#161f27;
    --line:#26323b; --fg:#e7eef3; --muted:#90a2b0; --amber:#f59e0b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);overflow:hidden}
  #map{position:absolute;inset:0}
  a{color:var(--accent2)}
  button{font-family:inherit}

  /* ---- top search bar (Google-style, always visible, thin) ---- */
  #searchbar{
    position:absolute;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:20;width:min(560px,calc(100vw - 20px));
    background:rgba(22,31,39,.96);backdrop-filter:blur(10px);border:1px solid var(--line);
    border-radius:13px;box-shadow:0 6px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;padding:7px 8px 7px 12px;
  }
  #searchbar svg{flex:0 0 auto;opacity:.7}
  #q{flex:1;min-width:0;background:none;border:0;color:var(--fg);font-size:16px;outline:none}
  #q::placeholder{color:var(--muted)}
  .iconbtn{flex:0 0 auto;background:none;border:0;color:var(--fg);cursor:pointer;border-radius:9px;padding:6px 9px;font-size:15px}
  .iconbtn:hover{background:#ffffff14}
  #toggle{position:relative}
  #toggle .count{position:absolute;top:-2px;right:-2px;background:var(--accent);color:#fff;font-size:.62rem;min-width:16px;height:16px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px;font-weight:700}
  #toggle .count.show{display:flex}

  /* ---- sheet (bottom on mobile, side card on desktop) ---- */
  #sheet{
    position:absolute;z-index:15;background:var(--panel);border:1px solid var(--line);
    display:flex;flex-direction:column;transition:transform .26s ease;overflow:hidden;
    left:0;right:0;bottom:0;border-radius:18px 18px 0 0;max-height:62vh;
    box-shadow:0 -8px 30px rgba(0,0,0,.45);transform:translateY(105%);
    padding-bottom:env(safe-area-inset-bottom);
  }
  #sheet.open{transform:translateY(0)}
  .grab{align-self:center;width:38px;height:4px;border-radius:3px;background:#3a4954;margin:8px 0 4px}
  .sheet-body{overflow:auto;padding:6px 16px 16px}
  .chips{display:flex;gap:8px;margin:2px 0 10px}
  .chip{flex:1;background:#0d141a;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:8px;font-size:.85rem;cursor:pointer}
  .chip.on{color:#fff;border-color:var(--accent);background:#0f2a27}
  .pane{display:none}
  .pane.on{display:block}

  .stoprow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
  .stoprow .pin{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700}
  .stoprow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stoprow .nm small{color:var(--muted);font-size:.74rem}
  .stoprow .del{background:none;border:0;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px}
  .stoprow .del:hover{color:#ff6b6b}
  .empty-note{color:var(--muted);font-size:.85rem;padding:10px 0}

  .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .ctl{flex:1;min-width:90px}
  .ctl label{display:block;color:var(--muted);font-size:.72rem;margin-bottom:3px}
  .ctl input{width:100%;background:#0d141a;border:1px solid var(--line);border-radius:8px;color:var(--fg);padding:7px 9px;font-size:.9rem}
  .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{flex:1;min-width:110px;border:0;border-radius:10px;padding:11px;font-weight:600;font-size:.9rem;cursor:pointer;color:#fff;background:var(--accent)}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:#0d141a;border:1px solid var(--line);color:var(--fg);font-weight:500}
  .btn.amber{background:var(--amber)}
  .rowmini{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .rowmini input[type=text]{flex:1;min-width:120px;background:#0d141a;border:1px solid var(--line);border-radius:8px;color:var(--fg);padding:8px 10px;font-size:.9rem}
  .result{margin-top:12px;padding:10px 12px;background:#0d141a;border:1px solid var(--line);border-radius:9px;font-size:.85rem;white-space:pre-wrap}
  .result.empty{display:none}
  .gpu{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);margin-top:12px}
  .gpu input{width:auto}
  .badge{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:999px;background:#0f2a27;color:var(--accent2);border:1px solid var(--line)}
  .hint{color:var(--muted);font-size:.78rem;margin:4px 0 0}
  .credit{position:absolute;bottom:6px;left:8px;z-index:5;font-size:.68rem;color:#7e909d;background:rgba(14,20,25,.6);padding:2px 7px;border-radius:7px}

  /* suggestions dropdown under search */
  #sugg{position:absolute;z-index:25;left:50%;transform:translateX(-50%);width:min(560px,calc(100vw - 20px));margin-top:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:none}
  #sugg .toast{padding:10px 14px;font-size:.85rem;color:var(--muted)}

  @media (min-width:760px){
    #sheet{left:12px;right:auto;bottom:auto;top:64px;width:360px;border-radius:14px;max-height:calc(100vh - 84px);transform:none;border:1px solid var(--line);box-shadow:0 8px 30px rgba(0,0,0,.4);display:none}
    #sheet.open{display:flex}
    .grab{display:none}
    #searchbar{left:12px;transform:none;width:360px}
    #sugg{left:12px;transform:none;width:360px}
  }

  /* loading overlay */
  #load{position:absolute;inset:0;z-index:60;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:24px}
  #load h2{margin:0;font-weight:700}
  #load .bar{width:min(360px,80vw);height:8px;background:#0d141a;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  #load .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .2s}
  #load .msg{color:var(--muted);font-size:.85rem}
  #load .err{color:#ff6b6b;font-size:.85rem;max-width:480px}
  .pin-num{color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);background:var(--accent)}
</style>

<body>
<div id="map"></div>
<div class="credit">MPEE · WASM · 100% local · <a href="https://github.com/punnerud/mpee">source</a></div>

<!-- top search bar -->
<div id="searchbar" hidden>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
  <input id="q" type="text" placeholder="Search an address or street…" autocomplete="off">
  <button class="iconbtn" id="add" title="Add stop">＋</button>
  <button class="iconbtn" id="toggle" title="Stops & actions">☰<span class="count" id="count"></span></button>
</div>
<div id="sugg"></div>

<!-- bottom sheet / side panel -->
<div id="sheet">
  <div class="grab"></div>
  <div class="sheet-body">
    <div class="chips">
      <button class="chip on" data-pane="trip">Trip &amp; routes</button>
      <button class="chip" data-pane="cross">Street crossing</button>
    </div>

    <!-- TRIP -->
    <div class="pane on" id="pane-trip">
      <div id="stoplist"></div>
      <div class="hint" id="trip-hint">Search an address above, tap the map, or import a CSV to add stops. 2 stops → route; 3+ → optimize.</div>
      <div class="controls">
        <div class="ctl"><label>Vehicles</label><input type="number" id="o-v" value="4" min="1" max="20"></div>
        <div class="ctl"><label>Capacity</label><input type="number" id="o-cap" value="10" min="1"></div>
      </div>
      <div class="actions">
        <button class="btn" id="act-route" disabled>Route A→B</button>
        <button class="btn amber" id="act-opt" disabled>Optimize</button>
      </div>
      <div class="actions">
        <button class="btn ghost" id="csv-imp">Import CSV</button>
        <button class="btn ghost" id="csv-exp">Export CSV</button>
        <button class="btn ghost" id="act-clear">Clear</button>
        <input type="file" id="csv-file" accept=".csv,text/csv" hidden>
      </div>
      <div class="gpu"><input type="checkbox" id="o-gpu"><label for="o-gpu" style="margin:0" id="o-gpu-l">GPU (WebGPU)</label></div>
      <div class="result empty" id="trip-out"></div>
    </div>

    <!-- CROSSING -->
    <div class="pane" id="pane-cross">
      <div class="hint">Where two named streets cross (offline intersection search).</div>
      <div class="rowmini"><input type="text" id="c-a" placeholder="Market Street"></div>
      <div class="rowmini"><input type="text" id="c-b" placeholder="5th Street"></div>
      <div class="actions"><button class="btn" id="c-go">Find crossings</button></div>
      <div class="result empty" id="c-out"></div>
    </div>
  </div>
</div>

<div id="load">
  <h2>MPEE live demo</h2>
  <div class="msg" id="load-msg">Loading the San Francisco map into your browser…</div>
  <div class="bar"><i id="load-bar"></i></div>
  <div class="err" id="load-err"></div>
</div>

<script type="module">
import init, { Engine } from './engine/mpee_wasm.js';

const SF = { lng: -122.4194, lat: 37.7749 };
const $ = (id) => document.getElementById(id);
const NaNf = Number.NaN;
const PALETTE = ['#0d9488','#f59e0b','#ef4444','#3b82f6','#a855f7','#10b981','#ec4899','#eab308','#06b6d4','#f97316','#8b5cf6','#14b8a6'];

let engine = null, map = null;
let stops = [];          // [{lat, lon, name}]
let stopMarkers = [];    // numbered markers for stops
let resultMarkers = [];  // depot / crossing markers
let mode = 'trip';

// ---------- asset loading ----------
async function fetchGunzip(url, onProgress) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`${url}: HTTP ${resp.status}`);
  const total = +resp.headers.get('content-length') || 0;
  let loaded = 0;
  const reader = resp.body.getReader();
  const chunks = [];
  for (;;) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); loaded += value.length; if (total && onProgress) onProgress(loaded/total); }
  const ds = new DecompressionStream('gzip');
  const stream = new Blob(chunks).stream().pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

async function boot() {
  try {
    if (typeof DecompressionStream === 'undefined') throw new Error('This browser lacks DecompressionStream — try a recent Chrome, Edge, Safari 16.4+ or Firefox 113+.');
    await init();
    const w = { pp:0.32, ch:0.66, names:0.02 }, p = { pp:0, ch:0, names:0 };
    const paint = () => $('load-bar').style.width = ((p.pp*w.pp + p.ch*w.ch + p.names*w.names)*100).toFixed(0)+'%';
    $('load-msg').textContent = 'Downloading the San Francisco routing cache (~30 MB, one-time)…';
    const [pp, ch, names] = await Promise.all([
      fetchGunzip('./data/sf.pp.gz', x=>{p.pp=x;paint();}),
      fetchGunzip('./data/sf.ch.gz', x=>{p.ch=x;paint();}),
      fetchGunzip('./data/sf.names.gz', x=>{p.names=x;paint();}),
    ]);
    $('load-msg').textContent = 'Building the in-browser engine…';
    engine = new Engine(pp, ch, names);
    setupMap(); setupUI();
    $('load').style.display = 'none';
    $('searchbar').hidden = false;
  } catch (e) {
    console.error(e);
    $('load-bar').style.background = '#ff6b6b';
    $('load-err').textContent = 'Failed to load: ' + (e?.message || e);
    $('load-msg').textContent = '';
  }
}

// ---------- map ----------
function setupMap() {
  map = new maplibregl.Map({ container:'map', style:'https://tiles.openfreemap.org/styles/liberty', center:[SF.lng, SF.lat], zoom:12.4 });
  map.addControl(new maplibregl.NavigationControl({ showCompass:false }), 'bottom-right');
  map.on('load', () => {
    map.addSource('route', { type:'geojson', data:fc([]) });
    map.addLayer({ id:'route', type:'line', source:'route',
      paint:{ 'line-color':['get','color'], 'line-width':5, 'line-opacity':.85 },
      layout:{ 'line-cap':'round', 'line-join':'round' } });
  });
  map.on('click', (e) => {
    const lat = e.lngLat.lat, lon = e.lngLat.lng;
    if (mode === 'trip') {
      const name = engine.has_names() ? (engine.reverse(lat, lon) || `${lat.toFixed(5)}, ${lon.toFixed(5)}`) : `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      addStop(lat, lon, name);
    } else if (engine.has_names()) {
      const s = engine.reverse(lat, lon);
      if (s) new maplibregl.Popup().setLngLat([lon, lat]).setHTML(`<b>${s}</b>`).addTo(map);
    }
  });
}
const fc = (features) => ({ type:'FeatureCollection', features });
const routeSrc = () => map && map.getSource && map.getSource('route');
function clearResultMarkers(){ resultMarkers.forEach(m=>m.remove()); resultMarkers=[]; }
function clearRoutes(){ const s=routeSrc(); if (s) s.setData(fc([])); }

// ---------- stops ----------
function addStop(lat, lon, name) {
  stops.push({ lat, lon, name: name || `${lat.toFixed(5)}, ${lon.toFixed(5)}` });
  renderStops();
  map.flyTo({ center:[lon, lat], zoom: Math.max(map.getZoom(), 13), duration:500 });
}
function renderStops() {
  stopMarkers.forEach(m=>m.remove()); stopMarkers=[];
  stops.forEach((s, i) => {
    const el = document.createElement('div'); el.className='pin-num'; el.textContent = i+1;
    const m = new maplibregl.Marker({ element: el }).setLngLat([s.lon, s.lat])
      .setPopup(new maplibregl.Popup({ offset:18 }).setHTML(`<b>${i+1}. ${s.name}</b>`)).addTo(map);
    stopMarkers.push(m);
  });
  // list
  const list = $('stoplist');
  list.innerHTML = '';
  if (!stops.length) { list.innerHTML = '<div class="empty-note">No stops yet.</div>'; }
  stops.forEach((s, i) => {
    const row = document.createElement('div'); row.className='stoprow';
    row.innerHTML = `<div class="pin">${i+1}</div><div class="nm">${s.name}<br><small>${s.lat.toFixed(5)}, ${s.lon.toFixed(5)}</small></div>`;
    const del = document.createElement('button'); del.className='del'; del.textContent='✕';
    del.onclick = () => { stops.splice(i,1); renderStops(); };
    row.appendChild(del); list.appendChild(row);
  });
  // counts + button states
  const c = $('count'); c.textContent = stops.length; c.classList.toggle('show', stops.length>0);
  $('act-route').disabled = stops.length !== 2;
  $('act-opt').disabled = stops.length < 2;
  $('act-route').textContent = stops.length===2 ? 'Route A→B' : `Route (need 2, have ${stops.length})`;
}

// ---------- actions ----------
function doRoute() {
  if (stops.length !== 2) return;
  clearRoutes(); clearResultMarkers();
  try {
    const r = JSON.parse(engine.route(stops[0].lat, stops[0].lon, stops[1].lat, stops[1].lon));
    drawLines([{ geom:r.geometry, color:'#0d9488' }]);
    fit([stops[0], stops[1]]);
    setOut('trip-out', `${stops[0].name} → ${stops[1].name}\ndistance: ${r.distance_km.toFixed(2)} km · ${r.duration_min.toFixed(1)} min`);
  } catch(e){ setOut('trip-out', 'No route: '+e.message); }
}

function doOptimize() {
  if (stops.length < 2) return;
  const vehicles = Math.max(1, +$('o-v').value || 4);
  const capacity = Math.max(1, +$('o-cap').value || 10);
  // First stop = depot; the rest are delivery jobs.
  const depot = [stops[0].lat, stops[0].lon];
  const jobs = stops.slice(1).map(s => [s.lat, s.lon]);
  const t0 = performance.now();
  let plan;
  try { plan = JSON.parse(engine.optimize(JSON.stringify(jobs), JSON.stringify(depot), vehicles, capacity, 2.0)); }
  catch(e){ setOut('trip-out', 'Optimize failed: '+e.message); return; }
  const ms = performance.now()-t0;
  lastPlan = plan;

  clearRoutes(); clearResultMarkers();
  resultMarkers.push(new maplibregl.Marker({ color:'#ffffff' }).setLngLat([depot[1], depot[0]]).setPopup(new maplibregl.Popup({offset:18}).setHTML('<b>Depot</b>')).addTo(map));
  const lines = [];
  plan.routes.forEach((rt, vi) => {
    const color = PALETTE[vi % PALETTE.length];
    const seq = [depot, ...rt.stops.map(s=>[s.lat, s.lon]), depot];
    const coords = [];
    for (let i=0;i<seq.length-1;i++){ try { const leg = JSON.parse(engine.route(seq[i][0],seq[i][1],seq[i+1][0],seq[i+1][1])); leg.geometry.forEach(pt=>coords.push([pt[1],pt[0]])); } catch(_){} }
    if (coords.length) lines.push({ coords, color });
  });
  drawLinesRaw(lines);
  fit(stops);
  const gpuOn = $('o-gpu').checked && navigator.gpu;
  setOut('trip-out',
    `${plan.vehicles_used} vehicles · ${plan.total_stops} stops (depot = stop 1)\n` +
    `total: ${plan.total_distance_km.toFixed(1)} km · ${plan.total_duration_min.toFixed(0)} min\n` +
    `unassigned: ${plan.unassigned.length} · solved in ${ms.toFixed(0)} ms on ${gpuOn?'GPU→CPU fallback':'CPU (WASM)'}` +
    (gpuOn ? '\n(WebGPU solver in progress — ran on CPU)' : ''));
}

function doCross() {
  const a = $('c-a').value.trim(), b = $('c-b').value.trim();
  if (!a || !b) return;
  const hits = JSON.parse(engine.intersection(a, b, NaNf, NaNf));
  clearResultMarkers();
  if (!hits.length) { setOut('c-out', `No intersection of "${a}" and "${b}" found.`); return; }
  hits.forEach((h,i)=> resultMarkers.push(new maplibregl.Marker({color:'#f59e0b'}).setLngLat([h.lon,h.lat]).setPopup(new maplibregl.Popup({offset:18}).setHTML(`${a} × ${b} (#${i+1})`)).addTo(map)));
  fit(hits);
  setOut('c-out', `${a} × ${b}: ${hits.length} match(es)\n` + hits.map(h=>`${h.lat.toFixed(6)}, ${h.lon.toFixed(6)}`).join('\n'));
}

// ---------- CSV ----------
let lastPlan = null;
function importCSV(text) {
  const rows = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let added = 0;
  for (const line of rows) {
    if (/^lat\s*,/i.test(line)) continue; // header
    const parts = line.split(',').map(s=>s.trim());
    const lat = parseFloat(parts[0]), lon = parseFloat(parts[1]);
    if (isFinite(lat) && isFinite(lon)) {
      const name = parts.slice(2).join(',') || (engine.has_names() ? (engine.reverse(lat,lon)||'') : '') || `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      stops.push({ lat, lon, name }); added++;
    } else {
      // treat the whole line as a street name → geocode
      const hit = JSON.parse(engine.geocode(line, NaNf, NaNf));
      if (hit) { stops.push({ lat:hit.lat, lon:hit.lon, name:hit.name }); added++; }
    }
  }
  renderStops();
  if (stops.length) fit(stops);
  setOut('trip-out', `Imported ${added} stop(s) from CSV.`);
}
function exportCSV() {
  let csv;
  if (lastPlan && lastPlan.routes && lastPlan.routes.length) {
    csv = 'vehicle,order,lat,lon\n';
    csv += `0,0,${lastPlan.depot[0]},${lastPlan.depot[1]}\n`; // depot
    lastPlan.routes.forEach(rt => rt.stops.forEach(s => { csv += `${rt.vehicle_id},${s.order},${s.lat},${s.lon}\n`; }));
  } else {
    csv = 'lat,lon,name\n' + stops.map(s=>`${s.lat},${s.lon},${(s.name||'').replace(/,/g,' ')}`).join('\n') + '\n';
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv' }));
  a.download = lastPlan ? 'mpee-route.csv' : 'mpee-stops.csv';
  a.click(); URL.revokeObjectURL(a.href);
}

// ---------- draw helpers ----------
function drawLines(items){ drawLinesRaw(items.map(it=>({ coords: it.geom.map(p=>[p[1],p[0]]), color: it.color }))); }
function drawLinesRaw(items){ const s=routeSrc(); if(!s) return; s.setData(fc(items.map(it=>({ type:'Feature', properties:{color:it.color}, geometry:{type:'LineString', coordinates:it.coords} })))); }
function fit(pts){ if(!pts.length) return; const b=new maplibregl.LngLatBounds(); pts.forEach(p=>b.extend([p.lon??p[1], p.lat??p[0]])); map.fitBounds(b,{padding:{top:90,bottom:280,left:40,right:40},maxZoom:16,duration:500}); }
function setOut(id, text){ const el=$(id); el.textContent=text; el.classList.toggle('empty', !text); }

// ---------- search / suggestions ----------
function runSearch() {
  const q = $('q').value.trim();
  if (!q) return;
  // direct "lat,lon"
  const ll = q.split(',').map(x=>parseFloat(x.trim()));
  if (ll.length===2 && isFinite(ll[0]) && isFinite(ll[1])) { addStop(ll[0], ll[1], `${ll[0].toFixed(5)}, ${ll[1].toFixed(5)}`); $('q').value=''; hideSugg(); return; }
  // "A & B" or "A x B" → crossing
  const m = q.split(/\s+(?:&|x|×|and)\s+/i);
  if (m.length===2) {
    const hits = JSON.parse(engine.intersection(m[0].trim(), m[1].trim(), NaNf, NaNf));
    if (hits.length) { addStop(hits[0].lat, hits[0].lon, `${m[0].trim()} × ${m[1].trim()}`); $('q').value=''; hideSugg(); return; }
  }
  const hit = JSON.parse(engine.geocode(q, NaNf, NaNf));
  if (hit) { addStop(hit.lat, hit.lon, hit.name); $('q').value=''; hideSugg(); }
  else showToast(`No street matching "${q}". Tip: try "Market Street", "Market & 5th", or "lat,lon".`);
}
function showToast(msg){ const s=$('sugg'); s.innerHTML=`<div class="toast">${msg}</div>`; s.style.display='block'; setTimeout(hideSugg, 3500); }
function hideSugg(){ $('sugg').style.display='none'; }

// ---------- UI wiring ----------
function setupUI() {
  renderStops();
  $('q').addEventListener('keydown', e => { if (e.key==='Enter'){ e.preventDefault(); runSearch(); }});
  $('add').onclick = runSearch;
  $('toggle').onclick = () => $('sheet').classList.toggle('open');

  document.querySelectorAll('.chip').forEach(ch => ch.onclick = () => {
    mode = ch.dataset.pane;
    document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on', x===ch));
    document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on', p.id==='pane-'+mode));
    $('q').placeholder = mode==='trip' ? 'Search an address or street…' : 'Tap the map to read a street name';
  });

  $('act-route').onclick = doRoute;
  $('act-opt').onclick = () => { doOptimize(); };
  $('act-clear').onclick = () => { stops=[]; lastPlan=null; clearRoutes(); clearResultMarkers(); renderStops(); setOut('trip-out',''); };
  $('c-go').onclick = doCross;
  $('csv-imp').onclick = () => $('csv-file').click();
  $('csv-file').onchange = (e) => { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>importCSV(r.result); r.readAsText(f); e.target.value=''; };
  $('csv-exp').onclick = exportCSV;

  const gpu=$('o-gpu'), lbl=$('o-gpu-l');
  if (navigator.gpu) { gpu.checked = true; lbl.innerHTML = 'GPU (WebGPU) <span class="badge">detected · on</span>'; }
  else { gpu.disabled=true; lbl.innerHTML='GPU (WebGPU) — not available in this browser'; }
}

boot();
</script>
