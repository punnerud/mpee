<style>
  :root{
    --accent:#0d9488; --accent2:#2dd4bf; --bg:#0e1419; --panel:#161f27;
    --line:#26323b; --fg:#e7eef3; --muted:#90a2b0; --amber:#f59e0b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);overflow:hidden}
  #map{position:absolute;inset:0}
  a{color:var(--accent2)}
  button{font-family:inherit}

  /* ---- top search bar (Google-style, always visible, thin) ---- */
  #searchbar{
    position:absolute;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:20;width:min(560px,calc(100vw - 20px));
    background:rgba(22,31,39,.96);backdrop-filter:blur(10px);border:1px solid var(--line);
    border-radius:13px;box-shadow:0 6px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;padding:7px 8px 7px 12px;

  #searchbar svg{flex:0 0 auto;opacity:.7}
  #q{flex:1;min-width:0;background:none;border:0;color:var(--fg);font-size:16px;outline:none}
  #q::placeholder{color:var(--muted)}
  .iconbtn{flex:0 0 auto;background:none;border:0;color:var(--fg);cursor:pointer;border-radius:9px;padding:6px 9px;font-size:15px}
  .iconbtn:hover{background:#ffffff14}
  #toggle{position:relative}
  #toggle .count{position:absolute;top:-2px;right:-2px;background:var(--accent);color:#fff;font-size:.62rem;min-width:16px;height:16px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px;font-weight:700}

  /* ---- sheet (bottom on mobile, side card on desktop) ---- */
  #sheet{
    position:absolute;z-index:15;background:var(--panel);border:1px solid var(--line);
    display:flex;flex-direction:column;transition:transform .26s ease;overflow:hidden;
    left:0;right:0;bottom:0;border-radius:18px 18px 0 0;max-height:62vh;
    box-shadow:0 -8px 30px rgba(0,0,0,.45);transform:translateY(105%);

  }
  #sheet.open{transform:translateY(0)}
  .grab{align-self:center;width:38px;height:4px;border-radius:3px;background:#3a4954;margin:8px 0 4px}
  .sheet-body{overflow:auto;padding:6px 16px 16px}
  .chips{display:flex;gap:8px;margin:2px 0 10px}
  .chip{flex:1;background:#0d141a;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:8px;font-size:.85rem;cursor:pointer}
  .chip.on{color:#fff;border-color:var(--accent);background:#0f2a27}
  .pane{display:none}

  .stoprow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
  .stoprow .pin{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700}
  .stoprow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stoprow .nm small{color:var(--muted);font-size:.74rem}
  .stoprow .del{background:none;border:0;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px}
  .stoprow .del:hover{color:#ff6b6b}
  .empty-note{color:var(--muted);font-size:.85rem;padding:10px 0}

  .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .ctl{flex:1;min-width:90px}
  .ctl label{display:block;color:var(--muted);font-size:.72rem;margin-bottom:3px}
  .ctl input{width:100%;background:#0d141a;border:1px solid var(--line);border-radius:8px;color:var(--fg);padding:7px 9px;font-size:.9rem}
  .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .btn{flex:1;min-width:110px;border:0;border-radius:10px;padding:11px;font-weight:600;font-size:.9rem;cursor:pointer;color:#fff;background:var(--accent)}

  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:#0d141a;border:1px solid var(--line);color:var(--fg);font-weight:500}
  .btn.amber{background:var(--amber)}
  .rowmini{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}

  .result{margin-top:12px;padding:10px 12px;background:#0d141a;border:1px solid var(--line);border-radius:9px;font-size:.85rem;white-space:pre-wrap}
  .result.empty{display:none}

  .veh-list{margin-top:8px;display:flex;flex-direction:column;gap:5px}
  .veh{display:flex;align-items:center;gap:8px;font-size:.84rem;white-space:normal}
  .veh .sw{flex:0 0 auto;width:12px;height:12px;border-radius:3px}
  .gpu{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);margin-top:12px}
  .gpu input{width:auto}
  .badge{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:999px;background:#0f2a27;color:var(--accent2);border:1px solid var(--line)}
  .hint{color:var(--muted);font-size:.78rem;margin:4px 0 0}
  .credit{position:absolute;bottom:6px;left:8px;z-index:5;font-size:.68rem;color:#7e909d;background:rgba(14,20,25,.6);padding:2px 7px;border-radius:7px}

  /* suggestions dropdown under search */
  #sugg{position:absolute;z-index:25;left:50%;transform:translateX(-50%);width:min(560px,calc(100vw - 20px));margin-top:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  #sugg .toast{padding:10px 14px;font-size:.85rem;color:var(--muted)}
  #sugg .sg{padding:10px 14px;font-size:.9rem;cursor:pointer;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
  #sugg .sg:last-child{border-bottom:0}
  #sugg .sg:hover,#sugg .sg.active{background:#0f2a27;color:#fff}
  #sugg .sg svg{opacity:.6;flex:0 0 auto}

  /* custom confirm dialog (not window.confirm) */
  #dialog{position:absolute;inset:0;z-index:70;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:24px}
  #dialog.open{display:flex}
  #dialog .box{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:340px;width:100%;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.55)}
  #dialog .box h3{margin:0 0 6px;font-size:1.02rem}
  #dialog .box p{margin:0 0 16px;color:var(--muted);font-size:.88rem}
  #dialog .box .btns{display:flex;gap:8px}

  @media (min-width:760px){
    #sheet{left:12px;right:auto;bottom:auto;top:64px;width:360px;border-radius:14px;max-height:calc(100vh - 84px);transform:none;border:1px solid var(--line);box-shadow:0 8px 30px rgba(0,0,0,.4);display:none}
    #sheet.open{display:flex}
    .grab{display:none}
    #searchbar{left:12px;transform:none;width:360px}
    #sugg{left:12px;transform:none;width:360px}
  }

  /* loading overlay */
  #load{position:absolute;inset:0;z-index:60;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:24px}
  #load h2{margin:0;font-weight:700}
  #load .bar{width:min(360px,80vw);height:8px;background:#0d141a;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  #load .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .2s}
  #load .msg{color:var(--muted);font-size:.85rem}
  #load .err{color:#ff6b6b;font-size:.85rem;max-width:480px}
  .pin-num{color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);background:var(--accent)}
</style>

<body>
<div id="map"></div>

<!-- top search bar -->

  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
  <input id="q" type="text" placeholder="Search an address or street…" autocomplete="off">

  <div class="sheet-body">

<div id="load">
  <h2>MPEE live demo</h2>

  <div class="bar"><i id="load-bar"></i></div>
  <div class="err" id="load-err"></div>
</div>

<script type="module">
// ?v= cache-busts the engine on each deploy (GitHub Pages caches assets ~10 min).
import init, { Engine, webgpu_probe } from './engine/mpee_wasm.js?v=2a2';
const BUILD = '2a2';

const SF = { lng: -122.4194, lat: 37.7749 };
const $ = (id) => document.getElementById(id);
const NaNf = Number.NaN;
// Green first, then red, blue, purple… — orange/yellow pushed to the end since
// they vanish against OpenFreeMap's orange/yellow road casing.
const PALETTE = ['#22c55e','#ef4444','#3b82f6','#a855f7','#ec4899','#06b6d4','#14b8a6','#8b5cf6','#84cc16','#f97316'];
const GREEN = '#22c55e';

let engine = null, map = null, BBOX = null, gpuVerified = false;
const inBounds = (lat, lon) => !BBOX || (lat>=BBOX.min_lat && lat<=BBOX.max_lat && lon>=BBOX.min_lon && lon<=BBOX.max_lon);
let stops = [];          // [{lat, lon, name}]
let stopMarkers = [];    // numbered markers for stops
let resultMarkers = [];  // depot / crossing markers
let mode = 'trip';

// ---------- asset loading ----------
async function fetchGunzip(url, onProgress) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`${url}: HTTP ${resp.status}`);
  const total = +resp.headers.get('content-length') || 0;
  let loaded = 0;
  const reader = resp.body.getReader();
  const chunks = [];
  for (;;) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); loaded += value.length; if (total && onProgress) onProgress(loaded/total); }
  const ds = new DecompressionStream('gzip');
  const stream = new Blob(chunks).stream().pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

async function boot() {
  try {
    if (typeof DecompressionStream === 'undefined') throw new Error('This browser lacks DecompressionStream — try a recent Chrome, Edge, Safari 16.4+ or Firefox 113+.');
    await init(`./engine/mpee_wasm_bg.wasm?v=${BUILD}`);
    const w = { pp:0.32, ch:0.66, names:0.02 }, p = { pp:0, ch:0, names:0 };
    const paint = () => $('load-bar').style.width = ((p.pp*w.pp + p.ch*w.ch + p.names*w.names)*100).toFixed(0)+'%';
    $('load-msg').textContent = 'Downloading the San Francisco routing cache (~30 MB, one-time)…';
    const [pp, ch, names] = await Promise.all([
      fetchGunzip('./data/sf.pp.gz', x=>{p.pp=x;paint();}),
      fetchGunzip('./data/sf.ch.gz', x=>{p.ch=x;paint();}),
      fetchGunzip('./data/sf.names.gz', x=>{p.names=x;paint();}),
    ]);
    $('load-msg').textContent = 'Building the in-browser engine…';
    engine = new Engine(pp, ch, names);
    setupMap(); setupUI();
    $('load').style.display = 'none';
    $('searchbar').hidden = false;
  } catch (e) {
    console.error(e);
    $('load-bar').style.background = '#ff6b6b';
    $('load-err').textContent = 'Failed to load: ' + (e?.message || e);
    $('load-msg').textContent = '';
  }
}

// ---------- map ----------
function setupMap() {
  map = new maplibregl.Map({ container:'map', style:'https://tiles.openfreemap.org/styles/liberty', center:[SF.lng, SF.lat], zoom:12.4 });
  map.addControl(new maplibregl.NavigationControl({ showCompass:false }), 'bottom-right');
  map.on('load', () => {
    // Coverage mask: dim everything OUTSIDE the downloaded data bbox, and trace
    // the boundary, so it's obvious where the demo can route.
    try {
      BBOX = JSON.parse(engine.bbox());
      const world = [[-180,-85],[180,-85],[180,85],[-180,85],[-180,-85]];
      const ring = [[BBOX.min_lon,BBOX.min_lat],[BBOX.max_lon,BBOX.min_lat],[BBOX.max_lon,BBOX.max_lat],[BBOX.min_lon,BBOX.max_lat],[BBOX.min_lon,BBOX.min_lat]];
      map.addSource('mask', { type:'geojson', data:{ type:'Feature', geometry:{ type:'Polygon', coordinates:[world, ring] } } });
      map.addLayer({ id:'mask', type:'fill', source:'mask', paint:{ 'fill-color':'#060a0d', 'fill-opacity':0.55 } });
      map.addSource('bounds', { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:ring } } });
      map.addLayer({ id:'bounds', type:'line', source:'bounds', paint:{ 'line-color':'#2dd4bf', 'line-width':2, 'line-dasharray':[3,2], 'line-opacity':0.9 } });
    } catch(_) {}
    map.addSource('route', { type:'geojson', data:fc([]) });
    map.addLayer({ id:'route', type:'line', source:'route',
      paint:{ 'line-color':['get','color'], 'line-width':5, 'line-opacity':.85 },
      layout:{ 'line-cap':'round', 'line-join':'round' } });
    map.addSource('streets', { type:'geojson', data:fc([]) });
    map.addLayer({ id:'streets', type:'line', source:'streets',
      paint:{ 'line-color':['get','color'], 'line-width':6, 'line-opacity':.65 },
      layout:{ 'line-cap':'round', 'line-join':'round' } });
  });
  map.on('click', (e) => {
    const lat = e.lngLat.lat, lon = e.lngLat.lng;
    if (!inBounds(lat, lon)) { outOfAreaWarning(); return; }
    if (mode === 'trip') {
      const name = engine.has_names() ? (engine.reverse(lat, lon) || `${lat.toFixed(5)}, ${lon.toFixed(5)}`) : `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      addStop(lat, lon, name);
    } else if (mode === 'cross') {
      crossClick(lat, lon);
    }
  });
}
const fc = (features) => ({ type:'FeatureCollection', features });
const routeSrc = () => map && map.getSource && map.getSource('route');
function clearResultMarkers(){ resultMarkers.forEach(m=>m.remove()); resultMarkers=[]; }
function clearRoutes(){ const s=routeSrc(); if (s) s.setData(fc([])); }

// ---------- stops ----------
function addStop(lat, lon, name, fly = true) {
  stops.push({ lat, lon, name: name || `${lat.toFixed(5)}, ${lon.toFixed(5)}` });
  lastPlan = null;            // stops changed → previous optimize result is stale
  stops.forEach(s => s.color = null);  // back to default green until next Optimize
  renderStops();              // also auto-routes through the stops in order
  if (fly) map.flyTo({ center:[lon, lat], zoom: Math.max(map.getZoom(), 13), duration:500 });
}

// Live route through the current stops, in tap/add order — recomputed on every
// change so you can tap around the map and watch each leg connect. Replaced by
// the coloured per-vehicle routes once you hit "Optimize".
function drawSequentialRoute() {
  if (stops.length < 2) { clearRoutes(); if (!stops.length) setOut('trip-out',''); return; }
  const coords = []; let totKm = 0, totMin = 0, ok = 0;
  for (let i = 0; i < stops.length - 1; i++) {
    try {
      const r = JSON.parse(engine.route(stops[i].lat, stops[i].lon, stops[i+1].lat, stops[i+1].lon));
      r.geometry.forEach(p => coords.push([p[1], p[0]]));
      totKm += r.distance_km; totMin += r.duration_min; ok++;
    } catch(_) {}
  }
  drawLinesRaw([{ coords, color:'#0d9488' }]);
  setOut('trip-out', `Route through ${stops.length} stops (tap order)\n`
    + `${totKm.toFixed(2)} km · ${fmtMin(totMin)}`
    + (ok < stops.length - 1 ? `\n(${stops.length-1-ok} leg(s) unreachable)` : ''));
}
// Markers + list, coloured by stops[i].color (set by Optimize per vehicle;
// default green). Does NOT touch the route layer, so Optimize can recolour the
// stops without wiping its coloured vehicle routes.
function renderStopsAndList() {
  stopMarkers.forEach(m=>m.remove()); stopMarkers=[];
  stops.forEach((s, i) => {
    const color = s.color || GREEN;
    const el = document.createElement('div'); el.className='pin-num'; el.textContent = i+1; el.style.background = color;
    const m = new maplibregl.Marker({ element: el }).setLngLat([s.lon, s.lat])
      .setPopup(new maplibregl.Popup({ offset:18 }).setHTML(`<b>${i+1}. ${s.name}</b>`)).addTo(map);
    stopMarkers.push(m);
  });
  const list = $('stoplist');
  list.innerHTML = '';
  if (!stops.length) { list.innerHTML = '<div class="empty-note">No stops yet.</div>'; }
  stops.forEach((s, i) => {
    const color = s.color || GREEN;
    const row = document.createElement('div'); row.className='stoprow';
    row.innerHTML = `<div class="pin" style="background:${color}">${i+1}</div><div class="nm">${s.name}<br><small>${s.lat.toFixed(5)}, ${s.lon.toFixed(5)}</small></div>`;
    const del = document.createElement('button'); del.className='del'; del.textContent='✕';
    del.onclick = () => { stops.splice(i,1); stops.forEach(x=>x.color=null); lastPlan=null; renderStops(); };
    row.appendChild(del); list.appendChild(row);
  });
  const c = $('count'); c.textContent = stops.length; c.classList.toggle('show', stops.length>0);
  $('act-route').disabled = stops.length !== 2;
  $('act-opt').disabled = stops.length < 2;
  $('act-route').textContent = stops.length===2 ? 'Route A→B' : `Route (need 2, have ${stops.length})`;
}
function renderStops() {
  renderStopsAndList();
  // Live route through the stops in order — recomputed on every add/remove so
  // tapping around the map connects each leg automatically.
  if (mode === 'trip') drawSequentialRoute();
}

// ---------- actions ----------
function doRoute() {
  if (stops.length !== 2) return;
  clearRoutes(); clearResultMarkers();
  try {
    const r = JSON.parse(engine.route(stops[0].lat, stops[0].lon, stops[1].lat, stops[1].lon));
    drawLines([{ geom:r.geometry, color:'#0d9488' }]);
    fit([stops[0], stops[1]]);
    setOut('trip-out', `${stops[0].name} → ${stops[1].name}\ndistance: ${r.distance_km.toFixed(2)} km · ${r.duration_min.toFixed(1)} min`);
  } catch(e){ setOut('trip-out', 'No route: '+e.message); }
}

function doOptimize() {
  if (stops.length < 2) return;
  const vehicles = Math.max(1, +$('o-v').value || 4);
  const capacity = Math.max(1, +$('o-cap').value || 10);
  // First stop = depot; the rest are delivery jobs.
  const depot = [stops[0].lat, stops[0].lon];
  const jobs = stops.slice(1).map(s => [s.lat, s.lon]);
  const t0 = performance.now();
  let plan;
  try { plan = JSON.parse(engine.optimize(JSON.stringify(jobs), JSON.stringify(depot), vehicles, capacity, 2.0)); }
  catch(e){ setOut('trip-out', 'Optimize failed: '+e.message); return; }
  const ms = performance.now()-t0;
  lastPlan = plan;

  clearRoutes(); clearResultMarkers();
  const lines = [];
  stops.forEach(s => s.color = null);
  stops[0].color = '#1f2937';   // depot (stop 1) — dark, clearly the start
  plan.routes.forEach((rt, vi) => {
    const color = PALETTE[vi % PALETTE.length];
    rt.stops.forEach(s => { if (stops[s.stop_index + 1]) stops[s.stop_index + 1].color = color; });
    const seq = [depot, ...rt.stops.map(s=>[s.lat, s.lon]), depot];
    const coords = [];
    for (let i=0;i<seq.length-1;i++){ try { const leg = JSON.parse(engine.route(seq[i][0],seq[i][1],seq[i+1][0],seq[i+1][1])); leg.geometry.forEach(pt=>coords.push([pt[1],pt[0]])); } catch(_){} }
    if (coords.length) lines.push({ coords, color });
  });
  drawLinesRaw(lines);
  renderStopsAndList();   // recolour stop pins per vehicle WITHOUT redrawing routes
  fit(stops);
  const gpuOn = $('o-gpu').checked && navigator.gpu;

  // Per-vehicle breakdown (colour-matched to the routes on the map).
  let html = `<b>${plan.vehicles_used} vehicle${plan.vehicles_used===1?'':'s'} · ${plan.total_stops} stops</b> · depot = stop 1<br>`
    + `total <b>${plan.total_distance_km.toFixed(1)} km</b> · ${fmtMin(plan.total_duration_min)}`
    + ` · unassigned ${plan.unassigned.length}`
    + `<br><span class="dim">solved in ${ms.toFixed(0)} ms on CPU (WASM)</span>`
    + (gpuOn ? `<br><span class="dim">WebGPU ${gpuVerified?'compute verified ✓':'detected'} — GPU VRP solver port in progress (stage 2b)</span>` : '')
    + `<div class="veh-list">`;
  plan.routes.forEach((rt, vi) => {
    const color = PALETTE[vi % PALETTE.length];
    html += `<div class="veh"><span class="sw" style="background:${color}"></span>`
      + `<b>Vehicle ${rt.vehicle_id}</b> — ${rt.n_stops} stops · ${rt.distance_km.toFixed(1)} km · ${fmtMin(rt.duration_min)}</div>`;
  });
  html += `</div>`;
  setOutHTML('trip-out', html);
}
function fmtMin(min){ const m=Math.round(min); return m>=60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m} min`; }

// ----- crossing: highlight whole streets + pin their intersection -----
let streetFeatures = { a:null, b:null };  // highlighted streets
let crossClicks = [];                     // street names tapped on the map
const STREET_A = '#22c55e', STREET_B = '#3b82f6', CROSS_PIN = '#ef4444';
function streetsSrc(){ return map && map.getSource && map.getSource('streets'); }
function clearStreets(){ streetFeatures={a:null,b:null}; const s=streetsSrc(); if(s) s.setData(fc([])); }
function paintStreets(){ const s=streetsSrc(); if(!s) return; s.setData(fc([streetFeatures.a, streetFeatures.b].filter(Boolean))); }
function drawStreet(slot, name, color) {
  const segs = JSON.parse(engine.street_segments(name)); // [[[lat,lon],[lat,lon]],…]
  const coords = segs.map(seg => [[seg[0][1], seg[0][0]], [seg[1][1], seg[1][0]]]); // → lon,lat
  streetFeatures[slot] = { type:'Feature', properties:{ color }, geometry:{ type:'MultiLineString', coordinates: coords } };
  paintStreets();
  return segs.length;
}
function pinCrossings(a, b) {
  const hits = JSON.parse(engine.intersection(a, b, NaNf, NaNf));
  clearResultMarkers();
  hits.forEach((h,i)=> resultMarkers.push(new maplibregl.Marker({color:CROSS_PIN})
    .setLngLat([h.lon,h.lat]).setPopup(new maplibregl.Popup({offset:18}).setHTML(`<b>${a} × ${b}</b>${hits.length>1?` (#${i+1})`:''}`)).addTo(map)));
  return hits;
}
function showCrossing(a, b) {
  clearStreets(); clearResultMarkers();
  const na = drawStreet('a', a, STREET_A);
  const nb = drawStreet('b', b, STREET_B);
  if (!na && !nb) { setOut('c-out', `Neither "${a}" nor "${b}" found in this area.`); return; }
  const hits = pinCrossings(a, b);
  const pts = hits.length ? hits : streetFeatures.a ? streetFeatures.a.geometry.coordinates.flat().map(c=>({lat:c[1],lon:c[0]})) : [];
  if (pts.length) fit(pts);
  setOut('c-out', hits.length
    ? `${a} × ${b}: ${hits.length} crossing(s)\n` + hits.map(h=>`${h.lat.toFixed(6)}, ${h.lon.toFixed(6)}`).join('\n')
    : `${a} and ${b} don't share a node (no at-grade crossing).`);
}
function doCross() {
  const a = $('c-a').value.trim(), b = $('c-b').value.trim();
  if (!a || !b) return;
  crossClicks = [];
  showCrossing(a, b);
}
// Map-tap flow: 1st tap → highlight that street; 2nd → highlight + pin crossing.
function crossClick(lat, lon) {
  if (!engine.has_names()) return;
  if (crossClicks.length >= 2) { clearStreets(); clearResultMarkers(); crossClicks = []; }
  const name = engine.reverse(lat, lon);
  if (!name) { showToast('No named street at that point — tap directly on a road.'); return; }
  const slot = crossClicks.length === 0 ? 'a' : 'b';
  drawStreet(slot, name, slot==='a' ? STREET_A : STREET_B);
  crossClicks.push(name);
  if (crossClicks.length === 2) {
    $('c-a').value = crossClicks[0]; $('c-b').value = crossClicks[1];
    const hits = pinCrossings(crossClicks[0], crossClicks[1]);
    setOut('c-out', hits.length
      ? `${crossClicks[0]} × ${crossClicks[1]}: ${hits.length} crossing(s)\n` + hits.map(h=>`${h.lat.toFixed(6)}, ${h.lon.toFixed(6)}`).join('\n')
      : `${crossClicks[0]} and ${crossClicks[1]} don't share a node (no crossing).`);
  } else {
    $('c-a').value = name; $('c-b').value = '';
    setOut('c-out', `Street A: ${name}\nTap a crossing street…`);
  }
}

// ---------- CSV ----------
let lastPlan = null;
function importCSV(text) {
  const rows = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let added = 0;
  for (const line of rows) {
    if (/^lat\s*,/i.test(line)) continue; // header
    const parts = line.split(',').map(s=>s.trim());
    const lat = parseFloat(parts[0]), lon = parseFloat(parts[1]);
    if (isFinite(lat) && isFinite(lon)) {
      const name = parts.slice(2).join(',') || (engine.has_names() ? (engine.reverse(lat,lon)||'') : '') || `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      stops.push({ lat, lon, name }); added++;
    } else {
      // treat the whole line as a street name → geocode
      const hit = JSON.parse(engine.geocode(line, NaNf, NaNf));
      if (hit) { stops.push({ lat:hit.lat, lon:hit.lon, name:hit.name }); added++; }
    }
  }
  renderStops();
  if (stops.length) fit(stops);
  setOut('trip-out', `Imported ${added} stop(s) from CSV.`);
}
function exportCSV() {
  let csv;
  if (lastPlan && lastPlan.routes && lastPlan.routes.length) {
    // One row per stop, carrying that vehicle's totals (km / min / stop count)
    // so the breakdown is usable straight from the CSV. Order 0 = depot.
    const hdr = 'vehicle,vehicle_stops,vehicle_km,vehicle_min,order,lat,lon,name';
    const d = lastPlan.depot;
    const rows = [];
    lastPlan.routes.forEach(rt => {
      const km = rt.distance_km.toFixed(3), min = rt.duration_min.toFixed(1), ns = rt.n_stops;
      rows.push(`${rt.vehicle_id},${ns},${km},${min},0,${d[0]},${d[1]},Depot`);
      rt.stops.forEach(s => {
        const nm = (stops[s.stop_index + 1]?.name || '').replace(/[,\n]/g,' ');
        rows.push(`${rt.vehicle_id},${ns},${km},${min},${s.order + 1},${s.lat},${s.lon},${nm}`);
      });
    });
    csv = hdr + '\n' + rows.join('\n') + '\n';
  } else {
    csv = 'lat,lon,name\n' + stops.map(s=>`${s.lat},${s.lon},${(s.name||'').replace(/[,\n]/g,' ')}`).join('\n') + '\n';
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv' }));
  a.download = lastPlan ? 'mpee-route.csv' : 'mpee-stops.csv';
  a.click(); URL.revokeObjectURL(a.href);
}

// ---------- draw helpers ----------
function drawLines(items){ drawLinesRaw(items.map(it=>({ coords: it.geom.map(p=>[p[1],p[0]]), color: it.color }))); }
function drawLinesRaw(items){ const s=routeSrc(); if(!s) return; s.setData(fc(items.map(it=>({ type:'Feature', properties:{color:it.color}, geometry:{type:'LineString', coordinates:it.coords} })))); }
function fit(pts){ if(!pts.length) return; const b=new maplibregl.LngLatBounds(); pts.forEach(p=>b.extend([p.lon??p[1], p.lat??p[0]])); map.fitBounds(b,{padding:{top:90,bottom:280,left:40,right:40},maxZoom:16,duration:500}); }
function setOut(id, text){ const el=$(id); el.textContent=text; el.classList.toggle('empty', !text); }
function setOutHTML(id, html){ const el=$(id); el.innerHTML=html; el.classList.toggle('empty', !html); }

// ---------- search / suggestions ----------
function runSearch() {
  clearTimeout(suggTimer); hideSugg();   // cancel any pending type-ahead
  const q = $('q').value.trim();
  if (!q) return;
  // direct "lat,lon"
  const ll = q.split(',').map(x=>parseFloat(x.trim()));
  if (ll.length===2 && isFinite(ll[0]) && isFinite(ll[1])) { addStop(ll[0], ll[1], `${ll[0].toFixed(5)}, ${ll[1].toFixed(5)}`); $('q').value=''; hideSugg(); return; }
  // "A & B" or "A x B" → crossing
  const m = q.split(/\s+(?:&|x|×|and)\s+/i);
  if (m.length===2) {
    const hits = JSON.parse(engine.intersection(m[0].trim(), m[1].trim(), NaNf, NaNf));
    if (hits.length) { addStop(hits[0].lat, hits[0].lon, `${m[0].trim()} × ${m[1].trim()}`); $('q').value=''; hideSugg(); return; }
  }
  const hit = JSON.parse(engine.geocode(q, NaNf, NaNf));
  if (hit) { addStop(hit.lat, hit.lon, hit.name); $('q').value=''; hideSugg(); }
  else showToast(`No street matching "${q}". Tip: try "Market Street", "Market & 5th", or "lat,lon".`);
}
function showToast(msg){ const s=$('sugg'); s.innerHTML=`<div class="toast">${msg}</div>`; s.style.display='block'; setTimeout(hideSugg, 3500); }
function hideSugg(){ $('sugg').style.display='none'; }

// Type-ahead suggestions (street names) under the search bar.
const PIN_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>';
function renderSuggestions(items){
  const s=$('sugg');
  if(!items.length){ hideSugg(); return; }
  s.innerHTML = items.map(n=>`<div class="sg" data-name="${n.replace(/"/g,'&quot;')}">${PIN_SVG}<span>${n}</span></div>`).join('');
  s.style.display='block';
  s.querySelectorAll('.sg').forEach(el => el.onmousedown = (e)=>{ e.preventDefault(); $('q').value = el.dataset.name; hideSugg(); runSearch(); });
}
let suggTimer=null;
function onSearchInput(){
  if (mode!=='trip'){ hideSugg(); return; }
  const q=$('q').value.trim();
  clearTimeout(suggTimer);
  if (q.length<2 || /,/.test(q)){ hideSugg(); return; }   // skip for "lat,lon"
  suggTimer=setTimeout(()=>{ try{ renderSuggestions(JSON.parse(engine.suggest(q,7))); }catch(_){ hideSugg(); } }, 110);
}

// Custom modal (not window.confirm). `cancel:null` → single-button info dialog;
// `html` allows links/markup in the body. Resolves true (ok) / false (cancel).
function openDialog({ title, html, ok='OK', cancel=null }){
  return new Promise(resolve=>{
    const d=$('dialog');
    $('dlg-title').textContent = title;
    $('dlg-msg').innerHTML = html;
    $('dlg-ok').textContent = ok;
    $('dlg-cancel').style.display = cancel===null ? 'none' : '';
    if (cancel) $('dlg-cancel').textContent = cancel;
    d.classList.add('open');
    const done=(v)=>{ d.classList.remove('open'); $('dlg-ok').onclick=null; $('dlg-cancel').onclick=null; d.onclick=null; document.removeEventListener('keydown', onKey); resolve(v); };
    const onKey=(e)=>{ if(e.key==='Escape') done(false); if(e.key==='Enter') done(true); };
    $('dlg-ok').onclick=()=>done(true); $('dlg-cancel').onclick=()=>done(false);
    d.onclick=(e)=>{ if(e.target===d) done(false); };
    document.addEventListener('keydown', onKey);
  });
}
function confirmDialog(title, msg, okLabel='Clear'){
  return openDialog({ title, html: msg.replace(/&/g,'&amp;').replace(/</g,'&lt;'), ok: okLabel, cancel:'Cancel' });
}
let outWarned = false;
function outOfAreaWarning(){
  if (outWarned) { showToast('Outside the downloaded San Francisco area.'); return; }
  outWarned = true;
  openDialog({
    title: 'Outside the demo area',
    html: `This point is outside the downloaded <b>San Francisco</b> map, so there's nothing to route here.
      The demo ships a single area to stay light — but the engine itself scales far beyond it:
      <ul style="margin:8px 0 8px 18px;padding:0">
        <li>up to <b>50,000</b> stops</li>
        <li>up to <b>~1,000</b> vehicles</li>
        <li><b>low memory</b> — it streams the distance matrix (~500&nbsp;MB for 50k×50k, vs ~10&nbsp;GB)</li>
        <li>CPU <b>+ GPU</b>, fully offline</li>
      </ul>
      Run it on <b>your own area</b>: <code>pip install mpee</code>, download your region, build once.<br>
      → <a href="https://github.com/punnerud/mpee" target="_blank" rel="noopener">github.com/punnerud/mpee</a>`,
    ok: 'Got it',
  });
}

// ---------- UI wiring ----------
function setupUI() {
  renderStops();
  $('q').addEventListener('keydown', e => { if (e.key==='Enter'){ e.preventDefault(); hideSugg(); runSearch(); }});
  $('q').addEventListener('input', onSearchInput);
  $('q').addEventListener('blur', () => setTimeout(hideSugg, 150));
  $('add').onclick = runSearch;
  $('toggle').onclick = () => $('sheet').classList.toggle('open');

  document.querySelectorAll('.chip').forEach(ch => ch.onclick = () => {
    mode = ch.dataset.pane;
    document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on', x===ch));
    document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on', p.id==='pane-'+mode));
    $('q').placeholder = mode==='trip' ? 'Search an address or street…' : 'Tap a street on the map, then a crossing street';
    if (mode !== 'cross') { clearStreets(); crossClicks=[]; }
  });

  $('act-route').onclick = doRoute;
  $('act-opt').onclick = () => { doOptimize(); };
  $('act-clear').onclick = async () => {
    if (!stops.length && !lastPlan && !crossClicks.length) return;
    const n = stops.length;
    const ok = await confirmDialog('Clear everything?',
      `This removes ${n} stop${n===1?'':'s'} and any drawn routes or highlighted streets.`);
    if (!ok) return;
    stops=[]; lastPlan=null; crossClicks=[]; clearRoutes(); clearResultMarkers(); clearStreets(); renderStops(); setOut('trip-out',''); setOut('c-out','');
  };
  $('c-go').onclick = doCross;
  $('csv-imp').onclick = () => $('csv-file').click();
  $('csv-file').onchange = (e) => { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>importCSV(r.result); r.readAsText(f); e.target.value=''; };
  $('csv-exp').onclick = exportCSV;

  const gpu=$('o-gpu'), lbl=$('o-gpu-l');
  if (navigator.gpu) {
    gpu.checked = true;
    lbl.innerHTML = 'GPU (WebGPU) <span class="badge">verifying…</span>';
    // Stage 2a: actually run a compute kernel on the GPU to confirm the path.
    webgpu_probe().then(r => {
      const j = JSON.parse(r);
      gpuVerified = !!j.ok;
      lbl.innerHTML = j.ok
        ? `GPU (WebGPU) <span class="badge" title="${j.adapter}">✓ compute verified</span>`
        : 'GPU (WebGPU) <span class="badge">detected</span>';
    }).catch(e => {
      console.warn('WebGPU probe failed:', e);
      lbl.innerHTML = 'GPU (WebGPU) <span class="badge">detected (no device)</span>';
    });
  } else {
    gpu.disabled = true;
    lbl.innerHTML = 'GPU (WebGPU) — not available in this browser';
  }
}

boot();
</script>
